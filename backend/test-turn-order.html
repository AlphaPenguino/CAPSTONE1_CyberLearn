<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Defenders - Turn Order Test</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
      }
      .section {
        margin: 20px 0;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      input,
      button {
        padding: 10px;
        margin: 5px;
        border: none;
        border-radius: 5px;
      }
      button {
        background: #8b5cf6;
        color: white;
        cursor: pointer;
      }
      button:disabled {
        background: #666;
        cursor: not-allowed;
      }
      .position-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 15px;
        margin: 20px 0;
      }
      .position-btn {
        padding: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        cursor: pointer;
        text-align: center;
        transition: all 0.3s ease;
      }
      .position-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .position-btn.selected {
        background: #8b5cf6;
        border-color: #8b5cf6;
      }
      .position-btn.taken {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.2);
        cursor: not-allowed;
      }
      .messages {
        max-height: 300px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 5px;
        margin: 10px 0;
      }
      .message {
        margin: 5px 0;
        padding: 5px;
        border-radius: 3px;
      }
      .message.info {
        background: rgba(59, 130, 246, 0.3);
      }
      .message.error {
        background: rgba(239, 68, 68, 0.3);
      }
      .message.success {
        background: rgba(34, 197, 94, 0.3);
      }
      .status {
        padding: 10px;
        border-radius: 5px;
        margin: 10px 0;
        text-align: center;
        font-weight: bold;
      }
      .status.connected {
        background: rgba(34, 197, 94, 0.3);
      }
      .status.disconnected {
        background: rgba(239, 68, 68, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🛡️ Digital Defenders - Turn Order Test</h1>

      <div class="status" id="status">Disconnected</div>

      <div class="section">
        <h2>Connection</h2>
        <input
          type="text"
          id="playerName"
          placeholder="Player Name"
          value="TestPlayer1"
        />
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
      </div>

      <div class="section">
        <h2>Room Management</h2>
        <button onclick="createRoom()">Create Room</button>
        <br />
        <input
          type="text"
          id="roomCode"
          placeholder="Room Code"
          maxlength="4"
        />
        <button onclick="joinRoom()">Join Room</button>
        <button onclick="leaveRoom()">Leave Room</button>
      </div>

      <div class="section" id="roomInfo" style="display: none">
        <h2>Room Info</h2>
        <div id="roomDetails"></div>
        <button onclick="startGame()" id="startBtn" style="display: none">
          Start Game
        </button>
      </div>

      <div class="section" id="turnOrderSection" style="display: none">
        <h2>Turn Order Selection</h2>
        <p>Select your preferred turn position:</p>
        <div class="position-grid" id="positionGrid"></div>
        <div id="selectionInfo"></div>
      </div>

      <div class="section">
        <h2>Messages</h2>
        <div class="messages" id="messages"></div>
      </div>
    </div>

    <script>
      let socket = null;
      let currentRoom = null;
      let isCreator = false;
      let mySelectedPosition = null;
      let turnOrderSelections = new Map();

      function addMessage(text, type = "info") {
        const messages = document.getElementById("messages");
        const message = document.createElement("div");
        message.className = `message ${type}`;
        message.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
        messages.appendChild(message);
        messages.scrollTop = messages.scrollHeight;
      }

      function updateStatus(text, connected = false) {
        const status = document.getElementById("status");
        status.textContent = text;
        status.className = `status ${connected ? "connected" : "disconnected"}`;
      }

      function updateRoomInfo(room) {
        const roomInfo = document.getElementById("roomInfo");
        const roomDetails = document.getElementById("roomDetails");
        const startBtn = document.getElementById("startBtn");

        if (room) {
          roomInfo.style.display = "block";
          roomDetails.innerHTML = `
                    <strong>Room ID:</strong> ${room.id}<br>
                    <strong>Players:</strong> ${room.players.length}/${
            room.maxPlayers
          }<br>
                    <strong>Players:</strong> ${room.players
                      .map((p) => `${p.name}${p.isCreator ? " (Creator)" : ""}`)
                      .join(", ")}
                `;

          if (isCreator && room.players.length >= 2) {
            startBtn.style.display = "block";
          } else {
            startBtn.style.display = "none";
          }
        } else {
          roomInfo.style.display = "none";
        }
      }

      function updateTurnOrderUI(playerCount) {
        const section = document.getElementById("turnOrderSection");
        const grid = document.getElementById("positionGrid");

        section.style.display = "block";
        grid.innerHTML = "";

        for (let i = 1; i <= playerCount; i++) {
          const btn = document.createElement("div");
          btn.className = "position-btn";
          btn.innerHTML = `
                    <div style="font-size: 24px; font-weight: bold;">${i}</div>
                    <div style="font-size: 14px;">${
                      i === 1
                        ? "First"
                        : i === 2
                        ? "Second"
                        : i === 3
                        ? "Third"
                        : "Fourth"
                    }</div>
                `;

          const isSelected = mySelectedPosition === i;
          const isTaken = Array.from(turnOrderSelections.values()).some(
            (s) => s.position === i
          );

          if (isSelected) {
            btn.classList.add("selected");
          } else if (isTaken) {
            btn.classList.add("taken");
          } else if (!mySelectedPosition) {
            btn.addEventListener("click", () => selectPosition(i));
          }

          grid.appendChild(btn);
        }

        updateSelectionInfo();
      }

      function updateSelectionInfo() {
        const info = document.getElementById("selectionInfo");
        const selections = Array.from(turnOrderSelections.entries()).sort(
          (a, b) => a[1].position - b[1].position
        );

        let html = `<h3>Current Selections:</h3>`;
        selections.forEach(([playerId, selection]) => {
          html += `<div>Position ${selection.position}: ${selection.playerName}</div>`;
        });

        info.innerHTML = html;
      }

      function selectPosition(position) {
        if (!socket || !currentRoom || mySelectedPosition) return;

        addMessage(`Selecting position ${position}...`, "info");
        socket.emit("select-turn-position", {
          roomCode: currentRoom,
          position,
        });
      }

      function connect() {
        if (socket) {
          addMessage("Already connected", "info");
          return;
        }

        socket = io("http://localhost:3000/digital-defenders");

        socket.on("connect", () => {
          addMessage("Connected to server", "success");
          updateStatus("Connected", true);
        });

        socket.on("disconnect", () => {
          addMessage("Disconnected from server", "error");
          updateStatus("Disconnected", false);
        });

        socket.on("error", (data) => {
          addMessage(`Error: ${data.message}`, "error");
        });

        socket.on("room-created", (data) => {
          addMessage("Room created successfully!", "success");
          currentRoom = data.roomCode;
          isCreator = true;
          updateRoomInfo(data.room);
        });

        socket.on("room-joined", (data) => {
          addMessage("Joined room successfully!", "success");
          currentRoom = data.roomCode;
          isCreator = false;
          updateRoomInfo(data.room);
        });

        socket.on("player-joined", (data) => {
          addMessage(`${data.playerName} joined the room`, "info");
          updateRoomInfo(data.room);
        });

        socket.on("turn-order-selection-started", (data) => {
          addMessage("Turn order selection started!", "success");
          updateTurnOrderUI(data.playerCount);
          turnOrderSelections.clear();
          mySelectedPosition = null;
        });

        socket.on("turn-position-selected", (data) => {
          addMessage(
            `${data.playerName} selected position ${data.position}`,
            "info"
          );
          turnOrderSelections.set(data.playerId, {
            position: data.position,
            playerName: data.playerName,
          });

          if (data.playerId === socket.id) {
            mySelectedPosition = data.position;
          }

          updateTurnOrderUI(Object.keys(currentRoom?.players || {}).length);
        });

        socket.on("turn-order-finalized", (data) => {
          addMessage("Turn order finalized!", "success");
          const orderText = data.playerOrder
            .map((p, i) => `${i + 1}. ${p.playerName}`)
            .join(", ");
          addMessage(`Final order: ${orderText}`, "success");
        });

        socket.on("game-started", (data) => {
          addMessage("Game started!", "success");
          document.getElementById("turnOrderSection").style.display = "none";
        });
      }

      function disconnect() {
        if (socket) {
          socket.disconnect();
          socket = null;
          currentRoom = null;
          isCreator = false;
          updateStatus("Disconnected", false);
          updateRoomInfo(null);
          document.getElementById("turnOrderSection").style.display = "none";
        }
      }

      function createRoom() {
        if (!socket) {
          addMessage("Not connected to server", "error");
          return;
        }

        const playerName = document.getElementById("playerName").value.trim();
        if (!playerName) {
          addMessage("Please enter your name", "error");
          return;
        }

        addMessage(`Creating room for ${playerName}...`, "info");
        socket.emit("create-room", { playerName });
      }

      function joinRoom() {
        if (!socket) {
          addMessage("Not connected to server", "error");
          return;
        }

        const playerName = document.getElementById("playerName").value.trim();
        const roomCode = document
          .getElementById("roomCode")
          .value.trim()
          .toUpperCase();

        if (!playerName || !roomCode) {
          addMessage("Please enter your name and room code", "error");
          return;
        }

        addMessage(`Joining room ${roomCode} as ${playerName}...`, "info");
        socket.emit("join-room", { roomCode, playerName });
      }

      function startGame() {
        if (!socket || !currentRoom || !isCreator) {
          addMessage("Cannot start game", "error");
          return;
        }

        addMessage("Starting game...", "info");
        socket.emit("start-game", { roomCode: currentRoom });
      }

      function leaveRoom() {
        if (!socket || !currentRoom) {
          addMessage("Not in a room", "error");
          return;
        }

        socket.emit("leave-room", { roomCode: currentRoom });
        currentRoom = null;
        isCreator = false;
        updateRoomInfo(null);
        document.getElementById("turnOrderSection").style.display = "none";
        addMessage("Left room", "info");
      }
    </script>
  </body>
</html>
